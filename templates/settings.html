<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки Скоринга</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/theme.css">
    <style>
        .settings-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 340px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            overflow-y: auto;
        }
        .file-item {
            padding: 16px 24px;
            cursor: pointer;
            border-left: 4px solid transparent;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .file-item:hover {
            background-color: var(--bg-color);
        }
        .file-item.active {
            background-color: var(--bg-color);
            border-left-color: var(--primary-light);
        }
        .file-name {
            font-weight: 600;
            color: var(--text-primary);
        }
        .file-desc {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: var(--bg-color);
        }
        .settings-card {
            background-color: var(--panel-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .card-title {
            font-size: 24px;
            font-weight: 700;
        }
        .btn-save {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(30, 58, 138, 0.2);
        }
        .btn-save:hover {
            background-color: var(--primary-light);
            transform: translateY(-1px);
        }
        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-left: 16px;
            border-left: 2px solid var(--border-color);
            padding-left: 24px;
        }
        .form-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            width: 280px;
            flex-shrink: 0;
        }
        .form-input {
            flex: 1;
            max-width: 250px;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        
        /* Убираем стрелочки у input type="number" */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        .section-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-secondary);
            margin: 32px 0 16px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-section">
            <div class="logo-icon">C</div>
            <div class="logo-title">Скоринг ДП — Настройки</div>
        </div>
        <div class="header-actions">
            <span id="save-status" style="font-size: 14px; font-weight: 600; display: none; margin-right: 20px;"></span>
            <a href="/" class="nav-btn">← К скорингу</a>
            <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeToggleBtn">
                🌙 Тёмная тема
            </button>
        </div>
    </header>

    <div class="settings-container">
        <aside class="sidebar">
            <div style="padding: 0 24px 16px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; font-size: 13px;">Файлы логики</div>
            <div id="file-list"></div>
        </aside>

        <main class="content-area">
            <div class="settings-card">
                <div class="card-header">
                    <h2 class="card-title" id="current-title">Загрузка...</h2>
                    <button class="btn-save" onclick="saveConfig()">Сохранить изменения</button>
                </div>
                <div id="form-container">
                    <!-- Форма рендерится скриптом -->
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/settings.js"></script>
</body>
</html>
