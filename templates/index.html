<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скоринг ДП</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            text-align: center;
        }

        .box {
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #f9f9f9;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            margin-top: 15px;
        }

        button:hover {
            background: #0056b3;
        }

        input[type="file"] {
            margin: 10px 0;
        }

        #status {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="box">
        <h2>Скоринг Департамента Продаж</h2>
        <input type="file" id="fileInput" accept=".xlsx, .xls">
        <br>
        <button onclick="upload()">Загрузить и Рассчитать</button>
        <div id="status"></div>
    </div>
    <script>
        async function upload() {
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('status');
            if (!file) { status.innerText = 'Выберите файл!'; return; }
            status.innerText = 'Обработка...';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/score', { method: 'POST', body: formData });
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'scoring_result.xlsx';
                    a.click();
                    status.innerText = 'Готово! Файл скачивается.';
                } else {
                    status.innerText = 'Ошибка обработки файла.';
                }
            } catch (e) {
                status.innerText = 'Ошибка сети.';
            }
        }
    </script>
</body>

</html>
